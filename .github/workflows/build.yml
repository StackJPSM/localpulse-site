name: Build Posts

permissions:
  contents: write

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate posts.json
        run: node scripts/generate-posts.js

      - name: Commit updated posts.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add posts.json
          git commit -m "Auto update posts.json" || exit 0
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/StackJPSM/localpulse-site.git
